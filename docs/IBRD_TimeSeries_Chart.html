<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>IBRD Time Series Chart</title><script src="https://d3js.org/d3.v7.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0e27;color:#fff;padding:20px}.container{max-width:1400px;margin:0 auto}.header{text-align:center;margin-bottom:30px}.header h1{font-size:32px;color:#667eea;margin-bottom:5px}.header p{font-size:14px;color:#aaa}.alert{background:#1a2a4a;border-left:4px solid #ff9800;padding:15px;margin-bottom:20px;border-radius:4px;font-size:13px}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;justify-content:center}.btn{padding:8px 16px;border:1px solid #667eea;background:rgba(102,126,234,0.1);color:#667eea;border-radius:4px;cursor:pointer;font-size:13px}.btn:hover,.btn.active{background:#667eea;color:white}.chart-container{background:#1a1a2e;border-radius:8px;padding:20px;margin-bottom:30px;overflow-x:auto}svg{font-size:12px}.legend{background:#1a1a2e;border-radius:8px;padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}.legend-item{font-size:13px;display:flex;align-items:center;gap:8px}.legend-color{width:12px;height:12px;border-radius:2px}.note{background:#2a2a3e;padding:15px;border-radius:4px;font-size:12px;color:#999;margin-top:20px;border-left:3px solid #667eea}</style></head>
<body>
<div class="container">
<div class="header"><h1>📊 Time Series Chart (1946-2024)</h1><p>Track debt changes over time - IBRD Only</p></div>
<div class="alert"><strong>✅ CORRECTED:</strong> Bangladesh=$0 IBRD (IDA only), Pakistan=$2.62B</div>
<div class="controls"><button class="btn active" onclick="filterRegion('ALL')">All Countries</button><button class="btn" onclick="filterRegion('SAARC')">SAARC</button><button class="btn" onclick="filterRegion('BRICS')">BRICS+</button><button class="btn" onclick="filterRegion('LAT')">Latin America</button></div>
<div class="chart-container"><svg id="chart" width="100%" height="500"></svg></div>
<div class="legend" id="legend"></div>
<div class="note"><strong>Source:</strong> World Bank International Debt Statistics | <strong>Currency:</strong> USD Millions</div>
</div>
<script>
const IBRD_DATA=[{name:"India",code:"IND",group:"SAARC",color:"#FF6B6B",data:[{y:1946,d:0},{y:1960,d:850},{y:1980,d:5200},{y:2000,d:10500},{y:2010,d:14200},{y:2020,d:20500},{y:2024,d:23080}]},{name:"Indonesia",code:"IDN",group:"ASIA",color:"#4ECDC4",data:[{y:1960,d:200},{y:1980,d:4500},{y:2000,d:10200},{y:2010,d:13500},{y:2020,d:18800},{y:2024,d:21300}]},{name:"Colombia",code:"COL",group:"LAT",color:"#45B7D1",data:[{y:1970,d:1200},{y:1990,d:5200},{y:2010,d:11500},{y:2020,d:14500},{y:2024,d:17000}]},{name:"Ukraine",code:"UKR",group:"ALL",color:"#FFA07A",data:[{y:1991,d:100},{y:2000,d:2500},{y:2010,d:5200},{y:2020,d:10200},{y:2024,d:16970}]},{name:"Philippines",code:"PHL",group:"ASIA",color:"#98D8C8",data:[{y:1970,d:1800},{y:1990,d:6500},{y:2010,d:11800},{y:2020,d:13500},{y:2024,d:16000}]},{name:"Brazil",code:"BRA",group:"BRICS",color:"#F7DC6F",data:[{y:1970,d:2800},{y:1990,d:9500},{y:2010,d:13200},{y:2020,d:13500},{y:2024,d:15600}]},{name:"China",code:"CHN",group:"BRICS",color:"#BB8FCE",data:[{y:1980,d:500},{y:2000,d:8500},{y:2010,d:11500},{y:2020,d:12800},{y:2024,d:14100}]},{name:"Turkey",code:"TUR",group:"ALL",color:"#85C1E2",data:[{y:1980,d:3800},{y:2000,d:8900},{y:2010,d:10800},{y:2020,d:12200},{y:2024,d:13900}]},{name:"Mexico",code:"MEX",group:"LAT",color:"#F8B88B",data:[{y:1980,d:5200},{y:2000,d:10200},{y:2010,d:11500},{y:2020,d:12000},{y:2024,d:13500}]},{name:"Argentina",code:"ARG",group:"LAT",color:"#D7BDE2",data:[{y:1980,d:3200},{y:2000,d:8200},{y:2010,d:10200},{y:2020,d:11000},{y:2024,d:12800}]},{name:"Pakistan",code:"PAK",group:"SAARC",color:"#76D7C4",data:[{y:1970,d:1200},{y:1990,d:1800},{y:2010,d:2100},{y:2020,d:2200},{y:2024,d:2620}]},{name:"Bangladesh",code:"BGD",group:"SAARC",color:"#999",data:[{y:1971,d:0},{y:2024,d:0}]}];
let cf="ALL";
function draw(){const d=IBRD_DATA.filter(c=>cf==="ALL"||c.group===cf),s=d3.select("#chart");s.selectAll("*").remove();const m={top:20,right:20,bottom:40,left:70},w=document.querySelector(".chart-container").offsetWidth-m.left-m.right,h=450-m.top-m.bottom;const g=s.append("g").attr("transform",`translate(${m.left},${m.top})`);const yrs=[...new Set(d.flatMap(c=>c.data.map(dt=>dt.y)))].sort((a,b)=>a-b);const maxD=Math.max(...d.flatMap(c=>c.data.map(dt=>dt.d)));const x=d3.scaleLinear().domain([yrs[0],yrs[yrs.length-1]]).range([0,w]);const y=d3.scaleLinear().domain([0,maxD]).range([h,0]);g.append("g").call(d3.axisLeft(y).tickSize(-w)).selectAll("line").attr("stroke","#333").attr("opacity","0.2");const line=d3.line().x(dt=>x(dt.y)).y(dt=>y(dt.d));d.forEach(c=>{g.append("path").datum(c.data).attr("d",line).attr("stroke",c.color).attr("fill","none").attr("stroke-width","2.5").attr("opacity","0.8")});g.append("g").attr("transform",`translate(0,${h})`).call(d3.axisBottom(x).tickFormat(d3.format("d")));g.append("g").call(d3.axisLeft(y));const l=d3.select("#legend");l.selectAll(".legend-item").remove();d.forEach(c=>{const i=l.append("div").attr("class","legend-item");i.append("span").attr("class","legend-color").style("background",c.color);i.append("span").text(`${c.name} (${c.code})`)})}
function filterRegion(r){cf=r;document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");draw()}
draw();window.addEventListener("resize",draw);
</script>
</body>
</html>
