<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>IBRD Velocity Map v3 - Interactive Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1a1a1a;
            color: white;
            padding: 8px 15px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: auto;
        }

        .header h1 {
            font-size: 12px;
            margin: 0;
            opacity: 0.7;
        }

        .header p {
            display: none;
        }

        .content {
            flex: 1;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .footer {
            background: #333;
            color: #999;
            padding: 10px 15px;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #555;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .toggle-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .toggle-btn.active {
            background: #4CAF50;
            border-color: #45a049;
        }

        .back-button {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .header {
                padding: 12px 15px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header p {
                font-size: 12px;
            }

            .back-button {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 10px 12px;
            }

            .header h1 {
                font-size: 18px;
                margin-bottom: 3px;
            }

            .header p {
                font-size: 11px;
                display: none;
            }

            .footer {
                font-size: 10px;
                padding: 8px 10px;
            }
        }

        /* Touch-friendly interactions */
        @media (hover: none) and (pointer: coarse) {
            .back-button {
                min-height: 44px;
                min-width: 44px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
        }

        /* Landscape mode optimization */
        @media (max-height: 500px) {
            .header h1 {
                font-size: 16px;
                margin-bottom: 2px;
            }

            .header {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-button">← Back</a>
            <h1>🗺️ IBRD Velocity Map v3</h1>
            <div class="controls">
                <button class="toggle-btn active" data-currency="usd">USD</button>
                <button class="toggle-btn" data-currency="inr">₹ Lakh/Cr</button>
            </div>
        </div>

        <div class="content">
            <iframe src="IBRD_VelocityMap_v3.html" title="IBRD Velocity Map"></iframe>
        </div>

        <div class="footer">
            <p>© 2025 IBRD Debt Visualization | Responsive Design</p>
        </div>
    </div>

    <script>
        let currentCurrency = 'usd';
        const exchangeRate = 83; // 1 USD = 83 INR (approximate)

        // Currency conversion utilities
        const currencyUtils = {
            formatINRLakh(value) {
                const num = parseFloat(value) * exchangeRate; // Convert USD to INR

                if (num >= 10000000) {
                    return '₹' + (num / 10000000).toFixed(2) + ' Cr';
                } else if (num >= 100000) {
                    return '₹' + (num / 100000).toFixed(2) + ' L';
                }
                return '₹' + num.toLocaleString('en-IN', { maximumFractionDigits: 2 });
            },

            formatUSD(value) {
                return '$' + parseFloat(value).toLocaleString('en-US', { maximumFractionDigits: 2 });
            }
        };

        // Initialize currency toggle buttons
        document.addEventListener('DOMContentLoaded', function() {
            const viewport = document.querySelector('meta[name="viewport"]');
            viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');

            // Add currency toggle listeners
            const currencyButtons = document.querySelectorAll('.toggle-btn');
            currencyButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    currencyButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCurrency = this.dataset.currency;
                    updateVisualization();
                });
            });
        });

        // Update visualization with new currency
        function updateVisualization() {
            const iframe = document.querySelector('iframe');
            if (iframe && iframe.contentWindow) {
                // Post message to iframe about currency change
                iframe.contentWindow.postMessage({
                    type: 'currency-change',
                    currency: currentCurrency,
                    exchangeRate: exchangeRate
                }, '*');
            }
        }

        // Receive messages from iframe
        window.addEventListener('message', function(event) {
            if (event.data.type === 'value-request') {
                const formattedValue = currentCurrency === 'inr'
                    ? currencyUtils.formatINRLakh(event.data.value)
                    : currencyUtils.formatUSD(event.data.value);

                event.source.postMessage({
                    type: 'value-response',
                    formatted: formattedValue
                }, '*');
            }
        });

        // Handle orientation changes
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                window.scrollTo(0, 0);
            }, 100);
        });
    </script>
</body>
</html>
